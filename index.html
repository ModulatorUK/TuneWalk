<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TuneWalk</title>

  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      overflow: hidden;
      background: black;
    }

    /* VIDEO FIX */
    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0; /* IMPORTANT: NOT NEGATIVE */
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2; /* ABOVE EVERYTHING */
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
    }

    .logo {
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .mockup {
      width: 320px;
      max-width: 80%;
      margin-bottom: 20px;
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
      100% { transform: translateY(0px); }
    }

    .headline {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .sub {
      font-size: 16px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <!-- VIDEO -->
  <video class="video-bg" autoplay muted loop playsinline preload="auto">
    <source src="video.mp4" type="video/mp4">
  </video>

  <!-- OVERLAY -->
  <div class="overlay"></div>

  <!-- CONTENT -->
  <div class="content">
    <img src="mockup.png" class="mockup" />

    <div class="logo">TuneWalk</div>

    <div class="headline">
      Discover London through its music history
    </div>

    <div class="sub">
      Launching in London soon
    </div>
  </div>

</body>
</html>
